<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1"
>
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
</head>
<body>
 <div class="p-3" layout:fragment="content">
     <div class="p-1">
         <a class="btn btn-info" href="/addPage">
             add Product
         </a>
     </div>
   <table class="table">
       <thead>
       <tr>
           <th>ID</th>
           <th>Name</th>
           <th>Price</th>
           <th>Quantity</th>
           <th>Actions</th>
       </tr>
       </thead>
       <tbody>
       <tr th:each="p:${productPage.content}">
           <td th:text="${p.id}"></td>
           <td th:text="${p.name}"></td>
           <td th:text="${p.price}"></td>
           <td th:text="${p.quantity}"></td>
           <td>
               <a class="btn btn-danger" th:href="@{/delete(id=${p.id})}">Delete</a>
               <a class="btn btn-info" th:href="@{/update(id=${p.id})}">update</a>
           </td>
       </tr>
       </tbody>
   </table>
 </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
</head>
<body>
 <div class="p-3">
   <table class="table">
       <thead>
       <tr>
           <th>ID</th>
           <th>Name</th>
           <th>price</th>
           <th>quantity</th>
       </tr>
       </thead>
       <tbody>
       <tr th:each="p:${productPage.content}">
           <td th:text="${p.id}"></td>
           <td th:text="${p.name}"></td>
           <td th:text="${p.price}"></td>
           <td th:text="${p.quantity}"></td>
       </tr>
       </tbody>
   </table>
 </div>

</body>
</html>

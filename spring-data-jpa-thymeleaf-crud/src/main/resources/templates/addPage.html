<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
   <div class="d-flex justify-content-center">
       <h3>Add Product Page</h3>
       <form  action="/addProduct" th:method="post">
         <div class="form-group">
             <input type="text" name="name" placeholder="Laptop" class="form-control">
         </div>
           <div class="form-group">
               <input type="text" name="price" placeholder="599.0" class="form-control">
           </div>

           <div class="form-group">
               <input type="text" name="quantity" placeholder="10" class="form-control">
           </div>

           <input type="submit" value="add Product">

       </form>
   </div>

</body>
</html>

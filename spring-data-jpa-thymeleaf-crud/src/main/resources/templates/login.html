<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"

>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

<div class="card shadow-sm" style="width: 360px;">
    <div class="card-body p-4">

        <h4 class="card-title text-center mb-4">Connexion</h4>

        <form method="post" th:action="@{/login}">
            <div class="mb-3">
                <label for="email" class="form-label">Adresse e-mail</label>
                <input type="text" id="email" class="form-control" name="username" placeholder=""/>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"/>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember"/>
                <label class="form-check-label" for="remember">Se souvenir de moi</label>
            </div>

            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>

        <p class="text-center text-muted mt-3 mb-0" style="font-size: 0.875rem;">
            Pas de compte ? <a href="#">S'inscrire</a>
        </p>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
